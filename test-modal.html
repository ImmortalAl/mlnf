<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Test - MLNF</title>
    <style>
        body {
            background: #0d0d1a;
            color: #f0e6ff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .test-button {
            background: #ff5e78;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
        }
        
        .test-button:hover {
            background: #FFD700;
            color: #0d0d1a;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.7);
        }
        
        .modal-content {
            background: #1a1a33;
            margin: 15% auto;
            padding: 20px;
            border: 2px solid #FFD700;
            width: 80%;
            max-width: 500px;
            border-radius: 10px;
        }
        
        .close {
            color: #f0e6ff;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: #FFD700;
        }
        
        .status {
            margin: 20px 0;
            padding: 10px;
            background: #2a4066;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>MLNF Modal Test Page</h1>
    <p>This page tests if modals are working correctly.</p>
    
    <div class="status" id="status">
        Status: Page loaded. Click a button to test.
    </div>
    
    <button class="test-button" id="testModal1">Test Modal 1</button>
    <button class="test-button" id="testModal2">Test Modal 2 (Higher Z-Index)</button>
    <button class="test-button" id="testNewsModal">Test News Modal</button>
    
    <!-- Test Modal 1 -->
    <div id="modal1" class="modal">
        <div class="modal-content">
            <span class="close" id="close1">&times;</span>
            <h2>Test Modal 1</h2>
            <p>This is a basic modal with z-index: 2000</p>
        </div>
    </div>
    
    <!-- Test Modal 2 -->
    <div id="modal2" class="modal" style="z-index: 3000;">
        <div class="modal-content">
            <span class="close" id="close2">&times;</span>
            <h2>Test Modal 2</h2>
            <p>This modal has z-index: 3000</p>
        </div>
    </div>
    
    <!-- News Modal (copied from news.html) -->
    <div id="submissionModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeSubmissionModal">&times;</span>
            <h3>News Submission Modal</h3>
            <p>If you can see this, the modal is working!</p>
        </div>
    </div>
    
    <script>
        const status = document.getElementById('status');
        
        // Test Modal 1
        const modal1 = document.getElementById('modal1');
        const btn1 = document.getElementById('testModal1');
        const close1 = document.getElementById('close1');
        
        btn1.onclick = function() {
            console.log('Opening modal 1');
            status.textContent = 'Status: Opening Modal 1...';
            modal1.style.display = 'block';
            status.textContent = 'Status: Modal 1 should be visible. Display: ' + modal1.style.display;
        }
        
        close1.onclick = function() {
            modal1.style.display = 'none';
            status.textContent = 'Status: Modal 1 closed';
        }
        
        // Test Modal 2
        const modal2 = document.getElementById('modal2');
        const btn2 = document.getElementById('testModal2');
        const close2 = document.getElementById('close2');
        
        btn2.onclick = function() {
            console.log('Opening modal 2');
            status.textContent = 'Status: Opening Modal 2...';
            modal2.style.display = 'block';
            status.textContent = 'Status: Modal 2 should be visible. Display: ' + modal2.style.display;
        }
        
        close2.onclick = function() {
            modal2.style.display = 'none';
            status.textContent = 'Status: Modal 2 closed';
        }
        
        // News Modal
        const newsModal = document.getElementById('submissionModal');
        const btnNews = document.getElementById('testNewsModal');
        const closeNews = document.getElementById('closeSubmissionModal');
        
        btnNews.onclick = function() {
            console.log('Opening news modal');
            status.textContent = 'Status: Opening News Modal...';
            newsModal.style.display = 'block';
            status.textContent = 'Status: News Modal should be visible. Display: ' + newsModal.style.display;
        }
        
        closeNews.onclick = function() {
            newsModal.style.display = 'none';
            status.textContent = 'Status: News Modal closed';
        }
        
        // Click outside to close
        window.onclick = function(event) {
            if (event.target == modal1) {
                modal1.style.display = 'none';
                status.textContent = 'Status: Modal 1 closed (clicked outside)';
            }
            if (event.target == modal2) {
                modal2.style.display = 'none';
                status.textContent = 'Status: Modal 2 closed (clicked outside)';
            }
            if (event.target == newsModal) {
                newsModal.style.display = 'none';
                status.textContent = 'Status: News Modal closed (clicked outside)';
            }
        }
        
        // Log all modal elements on load
        console.log('Modal elements found:');
        console.log('Modal 1:', modal1);
        console.log('Modal 2:', modal2);
        console.log('News Modal:', newsModal);
    </script>
</body>
</html>
