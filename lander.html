<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLNF Headquarters</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.6/quill.snow.css">
    <style>
        :root {
            --primary: #0d0d1a;
            --secondary: #1a1a33;
            --accent: #ff5e78;
            --text: #f0e6ff;
            --highlight: #2a4066;
            --gradient-accent: linear-gradient(45deg, #ff5e78, #ff8f00);
            --gradient-secondary: linear-gradient(to bottom, var(--secondary), rgba(26, 26, 51, 0.9));
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            --shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
            --border-radius: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: linear-gradient(180deg, var(--primary), rgba(13, 13, 26, 0.7)), url('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?auto=format&fit=crop&w=2070&q=80') center/cover fixed;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--gradient-secondary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo i {
            color: var(--accent);
            font-size: 2.2rem;
            animation: pulseGlow 2s infinite;
        }

        .logo h1 {
            font-weight: 300;
            font-size: 1.8rem;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            display: flex;
            gap: 0.5rem;
            list-style: none;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--accent);
            background: rgba(255, 94, 120, 0.2);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-info img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--accent);
        }

        .btn {
            padding: 0.7rem 1.4rem;
            border-radius: var(--border-radius);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--gradient-accent);
            color: var(--primary);
            border: none;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 20px rgba(255, 94, 120, 0.7);
        }

        main {
            padding: 2rem;
            flex: 1;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
        }

        section {
            background: var(--gradient-secondary);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 94, 120, 0.25);
        }

        h2 {
            font-family: 'Lato', sans-serif;
            font-size: 1.6rem;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        #editor {
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent);
        }

        ul {
            list-style: none;
        }

        ul li {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 94, 120, 0.2);
        }

        ul li a {
            color: var(--text);
            text-decoration: none;
        }

        ul li a:hover {
            color: var(--accent);
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .activity-card {
            background: rgba(255, 94, 120, 0.08);
            padding: 1rem;
            border-radius: var(--border-radius);
            border-left: 4px solid var(--accent);
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 1rem;
            }
            nav ul {
                flex-direction: column;
                gap: 1rem;
            }
            .user-info {
                margin-top: 1rem;
            }
            section {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-infinity" aria-hidden="true"></i>
            <h1>MLNF Headquarters</h1>
        </div>
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="pages/profiles.html"><i class="fas fa-user-secret"></i> Eternal Souls</a></li>
                <li><a href="pages/blog.html"><i class="fas fa-scroll"></i> Soul Scrolls</a></li>
                <li><a href="pages/messageboard.html"><i class="fas fa-comments"></i> Echoes Unbound</a></li>
                <li><a href="pages/news.html"><i class="fas fa-newspaper"></i> Boundless Chronicles</a></li>
                <li><a href="pages/debate.html"><i class="fas fa-gavel"></i> Clash of Immortals</a></li>
                <li><a href="pages/mindmap.html"><i class="fas fa-project-diagram"></i> Infinite Nexus</a></li>
                <li><a href="pages/archive.html"><i class="fas fa-vault"></i> Timeless Vault</a></li>
            </ul>
        </nav>
        <div class="user-info">
            <img src="user-avatar.jpg" alt="User Avatar">
            <span>Welcome, [Username]</span>
            <button class="btn btn-primary" id="logoutBtn">Logout</button>
        </div>
    </header>
    <main>
        <section class="notifications">
            <h2>Notifications</h2>
            <ul id="notificationList">
                <!-- Populated dynamically -->
            </ul>
        </section>
        <section class="blog-composer">
            <h2>Compose New Scroll</h2>
            <div id="editor"></div>
            <button class="btn btn-primary" id="publishBtn">Publish</button>
        </section>
        <section class="my-blogs">
            <h2>My Scrolls</h2>
            <ul id="myBlogsList">
                <!-- Populated dynamically -->
            </ul>
        </section>
        <section class="site-activity">
            <h2>Site Activity</h2>
            <div class="activity-grid" id="activityGrid">
                <!-- Populated dynamically -->
            </div>
        </section>
    </main>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Initialize Quill editor
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    ['link', 'image'],
                    [{ 'header': 1 }, { 'header': 2 }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }]
                ]
            }
        });

        // Simulated API calls (replace with actual endpoints)
        async function fetchNotifications() {
            const token = localStorage.getItem('sessionToken');
            const notifications = [
                { message: "New comment on your scroll" },
                { message: "Eternal seeker followed you" }
            ];
            document.getElementById('notificationList').innerHTML = notifications.map(n => `<li>${n.message}</li>`).join('');
        }

        async function fetchMyBlogs() {
            const token = localStorage.getItem('sessionToken');
            const blogs = [
                { id: 1, title: "Eternal Thoughts" },
                { id: 2, title: "Beyond Time" }
            ];
            document.getElementById('myBlogsList').innerHTML = blogs.map(b => `<li><a href="pages/blog.html?id=${b.id}">${b.title}</a></li>`).join('');
        }

        async function fetchSiteActivity() {
            const activities = [
                { title: "Trending Scroll", description: "The Power of Truth" },
                { title: "Active Debate", description: "Freedom vs. Control" }
            ];
            document.getElementById('activityGrid').innerHTML = activities.map(a => `
                <div class="activity-card">
                    <h3>${a.title}</h3>
                    <p>${a.description}</p>
                </div>
            `).join('');
        }

        document.getElementById('publishBtn').addEventListener('click', () => {
            const content = quill.root.innerHTML;
            console.log('Publishing:', content);
            // Add API call to publish content
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('sessionToken');
            window.location.href = 'index.html';
        });

        document.addEventListener('DOMContentLoaded', () => {
            fetchNotifications();
            fetchMyBlogs();
            fetchSiteActivity();
        });
    </script>
</body>
</html>
