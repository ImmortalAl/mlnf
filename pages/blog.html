<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Share timeless reflections in an eternal sanctuary.">
    <meta name="theme-color" content="#0d0d1a">
    <title>Soul Scrolls - Manifest Liberation, Naturally Free</title>
    <!-- Immortal-themed favicon -->
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="apple-touch-icon" href="../favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=MedievalSharp&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>
    <!-- Config MUST be loaded first -->
    <script src="../components/shared/config.js?v=1.2"></script>
    <link rel="stylesheet" href="../css/base-theme.css">
    <link rel="stylesheet" href="../css/styles.css?v=1.4">
    <!-- Shared component styles -->
    <link rel="stylesheet" href="../components/shared/styles.css?v=1.6">
    <link rel="stylesheet" href="../css/active-users.css?v=1.2">
    <!-- Page specific styles -->
    <link rel="stylesheet" href="../css/blog.css?v=2.2">
    <link rel="stylesheet" href="../css/owls.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="/">
                <i class="fas fa-infinity"></i>
                <div class="title-stack">
                    <span class="full-title">
                        <span class="title-line-one">Manifest Liberation</span>
                        <span class="title-line-two">Naturally Free</span>
                    </span>
                    <span class="short-title">MLNF</span>
                </div>
            </a>
        </div>
        <button class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Toggle navigation">
            <i class="fas fa-bars"></i>
        </button>
        <nav class="main-nav">
            <ul></ul>
        </nav>
        <div class="header-controls">
            <div class="user-menu" id="userMenuContainer"></div> <!-- Populated by userMenu.js -->
            <div class="header-auth-buttons" id="headerAuthButtonsContainer" style="display: none;">
                <!-- Populated by userMenu.js when logged out -->
            </div>
        </div>
        
        <!-- Mobile Navigation -->
        <div class="mobile-overlay" id="mobileOverlay"></div>
        <nav class="mobile-nav" id="mobileNav">
            <div class="sidebar-header">
                <h2>Eternal Navigation</h2>
                <button class="close-sidebar" id="closeMobileNav" aria-label="Close mobile navigation">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <ul class="mobile-nav-list">
                <!-- Links will be dynamically populated -->
            </ul>
        </nav>
    </header>

    <!-- Active Users Sidebar -->
    <aside class="active-users" id="activeUsers" aria-label="Active users panel">
        <div class="active-users-header">
            <h3>Eternal Seekers</h3>
            <button class="close-sidebar" id="closeUsers" aria-label="Close sidebar">×</button>
        </div>
        <div id="userList"></div> <!-- Populated by activeUsers.js -->
    </aside>
    <button class="show-users-btn" id="showUsersBtn" aria-label="Show active users"><i class="fas fa-users"></i></button>

    <!-- Message Modal -->
    <div id="messageModal" class="modal" aria-hidden="true">
        <div class="message-modal-content" role="dialog" aria-labelledby="messageTitle">
            <h3 id="messageTitle">Direct Message</h3>
            <div class="message-history" id="messageHistory"></div>
            <div>
                <input type="text" id="messageInput" placeholder="Inscribe your eternal message..." required>
                <div class="modal-actions">
                    <button type="submit" id="sendMessageBtn">Send Whisper</button>
                    <button type="button" id="closeMessageModal">Close Nexus</button>
                </div>
            </div>
        </div>
    </div>

    <main>
        <div class="scroll-archive">
            <h1 class="archive-title">📜 Soul Scrolls</h1>
            
            <div id="blogList" class="scroll-grid"></div>
            
            <div id="scroll-observer" class="ancient-loader" style="display:none;">
                <div class="relic-spinner"></div>
                <div class="loading-text">Unearthing more scrolls...</div>
            </div>
        </div>
    </main>

    <!-- Owl Sharing Modal -->
    <div id="sharing-modal" class="parchment-scroll" onclick="if(event.target === this) closeOwlModal()">
        <div class="incantation-box">
            <h3>🦉 Dispatch Wisdom Owl</h3>
            <div class="owl-messenger">
                <input type="email" id="owl-email" placeholder="Recipient's earthly address" class="parchment-input">
                <div class="owl-sprite"></div>
                <button onclick="sendOwlMessage()" class="owl-button">Release the Messenger</button>
                <div id="owl-status" class="owl-status"></div>
                <input type="hidden" id="share-url">
            </div>
            <button onclick="closeOwlModal()" class="owl-button" style="margin-top:1rem;">Close</button>
        </div>
    </div>

    <!-- Full Blog Post Modal -->
    <div id="blogModal" class="modal" aria-hidden="true" style="display:none;">
        <div class="blog-modal-content">
            <button class="close-modal" onclick="closeBlogModal()" aria-label="Close modal">×</button>
            <div class="blog-modal-header">
                <div class="scroll-author">
                    <a href="#" id="modal-author-link" class="author-avatar">
                        <img id="modal-author-avatar" src="" alt="">
                    </a>
                    <div>
                        <a href="#" id="modal-author-name-link" class="author-name"></a>
                        <p id="modal-date" class="date"></p>
                    </div>
                </div>
            </div>
            <h2 id="modal-title" class="scroll-title"></h2>
            <div id="modal-content" class="scroll-content"></div>
            <div class="modal-actions">
                <button id="editPostBtn" class="edit-post-btn" onclick="editCurrentPost()" style="display: none;">
                    ✏️ Edit this scroll
                </button>
                <button class="whisper-link" onclick="shareCurrentPost()">
                    🦉 Whisper this scroll to another soul
                </button>
            </div>
            <!-- Comments Section -->
            <div class="blog-comments">
                <div id="blogComments"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>Eternal Year 1 - Manifest Liberation, Naturally Free. Eternity is ours.</p>
    </footer>

    <!-- Core MLNF Components -->
    <script src="../components/shared/config.js?v=1.2"></script>
    <script src="../components/shared/mlnf-core.js?v=1.2"></script>
    <script src="../js/mlnf-avatar-system.js?v=1.0"></script>
    <script src="../components/shared/navigation.js?v=1.2"></script>
    <script src="../components/shared/userMenu.js?v=1.2"></script>
    <script src="../components/shared/activeUsers.js?v=1.2"></script>
    <script src="../components/shared/messageModal.js?v=1.2"></script>
    <script src="../components/shared/comments.js?v=1.2"></script>
    <script src="../js/blog.js?v=1.7"></script>
    <script src="../js/scripts.js?v=1.2"></script>
</body>
</html>
