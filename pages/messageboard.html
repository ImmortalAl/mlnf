<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echoes Unbound - MLNF</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background: #0a0a23;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }
    h1 {
      text-align: center;
      color: #00ffff;
    }
    .post-form {
      margin-bottom: 2rem;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.5rem;
      border: none;
      border-radius: 5px;
      background: #1a1a3d;
      color: #e0e0e0;
      font-size: 1rem;
      resize: vertical;
    }
    button {
      display: block;
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      border: none;
      border-radius: 5px;
      background: #00ffff;
      color: #0a0a23;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #00cccc;
    }
    .posts {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .post {
      background: #1a1a3d;
      padding: 1rem;
      border-radius: 5px;
    }
    .post-author {
      color: #00ffff;
      font-weight: bold;
    }
    .post-time {
      color: #b0b0b0;
      font-size: 0.9rem;
    }
    .message {
      text-align: center;
      margin: 1rem 0;
      color: #00ff00;
    }
    .error {
      color: #ff3333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Echoes Unbound</h1>
    <div class="post-form">
      <textarea id="post-content" placeholder="Share your unbound thoughts..."></textarea>
      <button id="submit-post">Echo Forth</button>
    </div>
    <div class="message" id="message"></div>
    <div class="posts" id="posts"></div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const messageDiv = document.getElementById('message');
    const postsDiv = document.getElementById('posts');

    // Load posts on page load
    async function loadPosts() {
      try {
        const response = await fetch('http://localhost:3001/api/posts');
        const posts = await response.json();
        if (!response.ok) throw new Error(posts.error || 'Failed to load posts');
        postsDiv.innerHTML = posts.map(post => `
          <div class="post">
            <div class="post-author">${post.author.username}</div>
            <div class="post-time">${new Date(post.timestamp).toLocaleString()}</div>
            <div class="post-content">${post.content}</div>
          </div>
        `).join('');
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = error.message;
      }
    }

    // Submit new post
    document.getElementById('submit-post').addEventListener('click', async () => {
      const content = document.getElementById('post-content').value.trim();
      if (!content) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Please enter some content';
        return;
      }
      if (!token) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Please log in to post';
        return;
      }

      try {
        const response = await fetch('http://localhost:3001/api/posts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ content })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Post failed');
        
        messageDiv.className = 'message';
        messageDiv.textContent = data.message;
        document.getElementById('post-content').value = '';
        loadPosts(); // Refresh posts
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = error.message;
      }
    });

    // Initial load
    loadPosts();
  </script>
</body>
</html>
