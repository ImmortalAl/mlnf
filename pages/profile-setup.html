<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Setup - Manifest Liberation</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: #0d0d1a;
      --secondary: #1a1a33;
      --accent: #ff5e78;
      --text: #f0e6ff;
      --highlight: #2a4066;
      --success: #5cb85c;
      --warning: #ffca28;
      --danger: #ff4444;
      --gradient-accent: linear-gradient(45deg, #ff5e78, #ff8f00);
      --gradient-secondary: linear-gradient(to bottom, var(--secondary), rgba(26, 26, 51, 0.9));
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      --shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
      --border-radius: 12px;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }
    body {
      background: linear-gradient(180deg, var(--primary), rgba(13, 13, 26, 0.8)),
                  url('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?auto=format&fit=crop&w=2070&q=80') center/cover fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--gradient-secondary);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo i {
      color: var(--accent);
      font-size: 2.2rem;
      animation: pulseGlow 2s infinite;
    }
    .logo h1 {
      font-weight: 300;
      font-size: 1.8rem;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn {
      padding: 0.7rem 1.4rem;
      border-radius: var(--border-radius);
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background: var(--gradient-accent);
      color: var(--primary);
      border: none;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 0 20px rgba(255, 94, 120, 0.7);
    }
    main {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      gap: 2rem;
    }
    .profile-form, .profile-preview {
      background: var(--gradient-secondary);
      padding: 2rem;
      border-radius: var(--border-radius);
      border: 1px solid rgba(255, 94, 120, 0.25);
      flex: 1;
    }
    .profile-form h2, .profile-preview h2 {
      font-size: 1.8rem;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text);
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--accent);
      border-radius: var(--border-radius);
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-size: 1rem;
      transition: var(--transition);
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--warning);
      box-shadow: 0 0 10px rgba(255, 94, 120, 0.5);
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    .avatar-upload {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .avatar-upload img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      object-fit: cover;
    }
    .message {
      text-align: center;
      margin-top: 1rem;
      padding: 0.5rem;
      border-radius: var(--border-radius);
    }
    .message.success {
      background: rgba(92, 184, 92, 0.2);
      color: var(--success);
    }
    .message.error {
      background: rgba(255, 68, 68, 0.2);
      color: var(--danger);
    }
    .profile-card {
      background: rgba(255, 94, 120, 0.08);
      padding: 1.5rem;
      border-radius: var(--border-radius);
      border-left: 4px solid var(--accent);
      text-align: center;
      animation: pulseGlow 2s infinite;
    }
    .profile-card img16 {
      display: none;
    }
    .profile-card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      margin-bottom: 1rem;
    }
    .profile-card h3 {
      font-size: 1.6rem;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .profile-card p {
      font-size: 1.1rem;
      opacity: 0.95;
    }
    .status {
      font-style: italic;
      color: var(--warning);
      margin-top: 0.5rem;
    }
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    @media (max-width: 768px) {
      main {
        flex-direction: column;
        padding: 1rem;
      }
      .profile-form, .profile-preview {
        padding: 1.5rem;
      }
      .avatar-upload img {
        width: 60px;
        height: 60px;
      }
      .profile-card img {
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <i class="fas fa-infinity" aria-hidden="true"></i>
      <h1>Manifest Liberation</h1>
    </div>
    <button class="btn btn-outline" id="logoutBtn">Logout</button>
  </header>
  <main>
    <section class="profile-form">
      <h2>Craft Your Eternal Soul</h2>
      <form id="profileForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" readonly>
        </div>
        <div class="form-group">
          <label for="displayName">Display Name</label>
          <input type="text" id="displayName" name="displayName" maxlength="50" required>
        </div>
        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio" maxlength="500" placeholder="Share your eternal essence..."></textarea>
        </div>
        <div class="form-group">
          <label for="status">Status</label>
          <input type="text" id="status" name="status" maxlength="100" placeholder="e.g., Seeker of Truth">
        </div>
        <div class="form-group">
          <label for="avatar">Avatar</label>
          <div class="avatar-upload">
            <img id="avatarPreview" src="https://via.placeholder.com/80?text=Avatar" alt="Avatar Preview">
            <input type="file" id="avatar" name="avatar" accept="image/*">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save Profile</button>
        <button type="button" class="btn btn-outline" id="skipBtn">Skip for Now</button>
      </form>
      <div class="message" id="message"></div>
    </section>
    <section class="profile-preview">
      <h2>Your Eternal Mark</h2>
      <div class="profile-card">
        <img id="previewAvatar" src="https://via.placeholder.com/120?text=Avatar" alt="Profile Avatar">
        <h3 id="previewDisplayName">Your Name</h3>
        <p id="previewBio">Your essence will echo through eternity...</p>
        <p class="status" id="previewStatus">Immortal Seeker</p>
      </div>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const API_BASE_URL = 'https://mlnf-auth.onrender.com';
    const form = $('profileForm');
    const message = $('message');
    const saveBtn = $('saveBtn');
    const skipBtn = $('skipBtn');
    const logoutBtn = $('logoutBtn');
    const avatarInput = $('avatar');
    const avatarPreview = $('avatarPreview');
    const previewAvatar = $('previewAvatar');
    const previewDisplayName = $('previewDisplayName');
    const previewBio = $('previewBio');
    const previewStatus = $('previewStatus');

    // Check authentication
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('sessionToken');
      console.log('Token:', token);
      if (!token) {
        message.className = 'message error';
        message.textContent = 'No session token found. Redirecting to login...';
        setTimeout(() => window.location.href = 'auth.html?mode=login&redirect=profile-setup.html', 1000);
        return;
      }

      // Fetch username
      try {
        const response = await fetch(`${API_BASE_URL}/api/users/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Failed to fetch user data');
        }
        const user = await response.json();
        console.log('User data:', user);
        $('username').value = user.username || '';
      } catch (error) {
        console.error('Fetch user error:', error);
        message.className = 'message error';
        message.textContent = `Error fetching user data: ${error.message}`;
      }
    });

    // Live preview updates
    $('displayName').addEventListener('input', () => {
      previewDisplayName.textContent = $('displayName').value || 'Your Name';
    });
    $('bio').addEventListener('input', () => {
      previewBio.textContent = $('bio').value || 'Your essence will echo through eternity...';
    });
    $('status').addEventListener('input', () => {
      previewStatus.textContent = $('status').value || 'Immortal Seeker';
    });

    // Avatar upload preview
    avatarInput.addEventListener('change', () => {
      const file = avatarInput.files[0];
      if (file) {
        if (file.size > 2 * 1024 * 1024) { // 2MB limit
          message.className = 'message error';
          message.textContent = 'Avatar must be under 2MB';
          avatarInput.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          avatarPreview.src = e.target.result;
          previewAvatar.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // Form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = localStorage.getItem('sessionToken');
      const displayName = $('displayName').value.trim();
      const bio = $('bio').value.trim();
      const status = $('status').value.trim();
      const formData = new FormData();
      formData.append('displayName', displayName);
      formData.append('bio', bio);
      formData.append('status', status);
      if (avatarInput.files[0]) {
        formData.append('avatar', avatarInput.files[0]);
        console.log('Avatar file:', avatarInput.files[0].name);
      }
      console.log('Form data:', { displayName, bio, status });

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';
      message.textContent = '';

      try {
        const response = await fetch(`${API_BASE_URL}/api/users/profile`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        const data = await response.json();
        console.log('Response:', data);
        if (!response.ok) {
          throw new Error(data.details || data.error || 'Failed to save profile');
        }
        message.className = 'message success';
        message.textContent = 'Profile saved successfully!';
        setTimeout(() => window.location.href = '../lander.html', 1000);
      } catch (error) {
        console.error('Save profile error:', error);
        message.className = 'message error';
        message.textContent = `Failed to save profile: ${error.message}`;
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Profile';
      }
    });

    // Skip to lander
    skipBtn.addEventListener('click', () => {
      window.location.href = '../lander.html';
    });

    // Logout
    logoutBtn.addEventListener('click', async () => {
      const token = localStorage.getItem('sessionToken');
      try {
        await fetch(`${API_BASE_URL}/api/auth/logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
      } catch (error) {
        console.error('Logout error:', error);
      }
      localStorage.removeItem('sessionToken');
      window.location.href = 'auth.html?mode=login';
    });
  </script>
</body>
</html>
