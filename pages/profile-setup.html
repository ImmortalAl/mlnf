<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manifest Liberation, Naturally Free - Set up your eternal profile">
    <link rel="canonical" href="https://mlnf.net/pages/profile-setup.html">
    <title>Profile Setup - Manifest Liberation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #0d0d1a;
            --secondary: #1a1a33;
            --accent: #ff5e78;
            --text: #f0e6ff;
            --gradient-accent: linear-gradient(45deg, var(--accent), #ffca28);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            --border-radius: 12px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            background: linear-gradient(180deg, var(--primary), rgba(13, 13, 26, 0.8)), url('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?auto=format&fit=crop&w=2070&q=80') center/cover fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: linear-gradient(to bottom, var(--secondary), rgba(26, 26, 51, 0.9));
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 94, 120, 0.4);
        }
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
            font-size: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--accent);
            border-radius: var(--border-radius);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            font-size: 1rem;
            transition: var(--transition);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ffca28;
            box-shadow: 0 0 10px rgba(255, 94, 120, 0.5);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: var(--border-radius);
            background: var(--gradient-accent);
            color: var(--primary);
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            text-align: center;
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: var(--border-radius);
        }
        .message.success {
            background: rgba(92, 184, 92, 0.2);
            color: #5cb85c;
        }
        .message.error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }
        .avatar-preview {
            display: block;
            margin: 1rem auto;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }
        @media (max-width: 768px) {
            .container {
                width: 90%;
                margin: 1rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Setup Your Eternal Profile</h1>
        <form id="profile-form">
            <div class="form-group">
                <label for="displayName">Display Name</label>
                <input type="text" id="displayName" name="displayName" required>
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label for="avatar">Avatar</label>
                <input type="file" id="avatar" name="avatar" accept="image/*">
                <img src="/assets/images/default-avatar.png" alt="Avatar Preview" class="avatar-preview" id="avatarPreview">
            </div>
            <button type="submit" id="submit-btn">Save Profile</button>
        </form>
        <div class="message" id="message"></div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);
        const form = $('profile-form');
        const avatarInput = $('avatar');
        const avatarPreview = $('avatarPreview');
        const message = $('message');
        const API_BASE_URL = 'https://mlnf-auth.onrender.com';

        // Check token and redirect if invalid
        function checkToken() {
            const token = localStorage.getItem('sessionToken');
            if (!token) {
                message.className = 'message error';
                message.textContent = 'No session found. Redirecting to login...';
                setTimeout(() => window.location.href = '/pages/auth.html?mode=login', 2000);
                return false;
            }
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 < Date.now()) {
                    message.className = 'message error';
                    message.textContent = 'Session expired. Redirecting to login...';
                    setTimeout(() => window.location.href = '/pages/auth.html?mode=login', 2000);
                    return false;
                }
            } catch (e) {
                console.error('Invalid token format:', e);
                message.className = 'message error';
                message.textContent = 'Invalid session. Redirecting to login...';
                setTimeout(() => window.location.href = '/pages/auth.html?mode=login', 2000);
                return false;
            }
            return token;
        }

        // Fetch current user data
        async function fetchUserData() {
            const token = checkToken();
            if (!token) return;
            try {
                const response = await fetch(`${API_BASE_URL}/api/users/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`HTTP ${response.status}: ${text || 'Failed to fetch user data'}`);
                }
                const user = await response.json();
                console.log('User data:', user);
                return user;
            } catch (error) {
                console.error('Fetch user error:', error);
                message.className = 'message error';
                message.textContent = `Error fetching profile: ${error.message}`;
            }
        }

        // Populate form with existing data
        async function populateForm() {
            const user = await fetchUserData();
            if (user) {
                $('displayName').value = user.displayName || '';
                $('bio').value = user.bio || '';
                avatarPreview.src = user.avatar || '/assets/images/default-avatar.png';
                avatarPreview.onerror = () => {
                    avatarPreview.src = '/assets/images/default-avatar.png';
                    console.warn('Avatar failed to load, using default');
                };
            }
        }

        // Preview avatar
        avatarInput.addEventListener('change', () => {
            const file = avatarInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    avatarPreview.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Submit profile
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = checkToken();
            if (!token) return;

            const displayName = $('displayName').value.trim();
            const bio = $('bio').value.trim();
            const avatar = avatarInput.files[0];

            const formData = new FormData();
            formData.append('displayName', displayName);
            formData.append('bio', bio);
            if (avatar) formData.append('avatar', avatar);

            // Show loading state
            const submitBtn = $('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            message.textContent = '';

            try {
                const response = await fetch(`${API_BASE_URL}/api/users/profile`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData,
                    credentials: 'include'
                });

                if (!response.ok) {
                    const text = await response.text();
                    let errorData;
                    try {
                        errorData = JSON.parse(text);
                    } catch {
                        throw new Error(`HTTP ${response.status}: ${text || 'Unknown error'}`);
                    }
                    throw new Error(errorData.error || `Failed to save profile (HTTP ${response.status})`);
                }

                const user = await response.json();
                message.className = 'message success';
                message.textContent = 'Profile saved successfully!';
                form.reset();
                avatarPreview.src = user.avatar || '/assets/images/default-avatar.png';

                // Redirect to lander
                setTimeout(() => window.location.href = '/lander.html', 1000);
            } catch (error) {
                console.error('Profile save error:', error);
                message.className = 'message error';
                message.textContent = error.message || 'Network error - please try again';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Profile';
            }
        });

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            populateForm();
        });
    </script>
</body>
</html>
